name: Notify on routine activity

# Why: routine sessions run as the PR/issue author (mushgev), and GitHub
# never sends notifications for your own actions â€” including @mentions of
# yourself and self-review-requests. This workflow fires on PR/issue
# creation events that look like routine output and POSTs to the Telegram
# Bot API instead, bypassing the self-notify rule.
#
# Add two repo secrets before this works:
#   TELEGRAM_BOT_TOKEN â€” bot token from @BotFather
#   TELEGRAM_CHAT_ID   â€” your chat ID (DM the bot once, then GET
#                        https://api.telegram.org/bot<TOKEN>/getUpdates
#                        and copy chat.id)

on:
  pull_request:
    types: [opened]
  issues:
    # `opened` covers first-time issue creation. `reopened` lets the
    # drift-fp-next-fix queue-empty path notify on a material state
    # change of an existing [drift-fp-campaign-stuck] tracker â€” the
    # routine closes + reopens the tracker (with a "State change since
    # last run" delta header) instead of spawning a new issue every run.
    # Silent re-runs (no state change) edit the body in place and don't
    # trigger this workflow. See drift-fp-next-fix.md
    # "Notify-on-change protocol".
    types: [opened, reopened]

permissions:
  issues: read
  contents: read
  pull-requests: read

jobs:
  notify-pr:
    if: >
      github.event_name == 'pull_request' &&
      startsWith(github.event.pull_request.head.ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret not set â€” skipping notification."
            exit 0
          fi
          MESSAGE=$(printf "đź”” New routine PR #%s\n%s\n\nBranch: %s\n%s" \
            "$PR_NUMBER" "$PR_TITLE" "$PR_BRANCH" "$PR_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            > /dev/null

  # Bursts of *-fp-fix issues (discover initial filing, next-fix
  # re-discovery filing) used to produce one TG message per issue â€”
  # 30+ messages in a row. Debounce with concurrency: each new
  # `issues.opened` event cancels the prior in-progress run for the same
  # label, so only the last event's run survives. That run sleeps to let
  # the burst settle, queries all matching issues opened in the last 10
  # minutes, and sends ONE rollup message with the count.
  #
  # One matrixed job covers every scope+kind fix-label. The job `if`
  # only filters on the event type â€” the `matrix` context is NOT
  # available in job-level `if` (only in step-level `if`, `runs-on`,
  # `concurrency`, `env`, `steps`), so referencing `matrix.label` at the
  # job level rejects the whole workflow at load time. Instead, every
  # matrix instance spawns on an `issues` event and the **steps** filter
  # to the one whose label matches; the others no-op. Each label gets
  # its own concurrency group so the families never cancel each other.
  # Add a new scope by appending its labels (e.g. `cs-fp-fix`,
  # `cs-drift-fp-fix`).
  notify-fix-burst:
    strategy:
      matrix:
        label: [fp-fix, cs-fp-fix, drift-fp-fix, cs-drift-fp-fix]
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    concurrency:
      group: fix-burst-${{ matrix.label }}
      cancel-in-progress: true
    steps:
      - name: Wait for burst to settle
        if: contains(github.event.issue.labels.*.name, matrix.label)
        run: sleep 60

      - name: Send rollup Telegram message
        if: contains(github.event.issue.labels.*.name, matrix.label)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          LABEL: ${{ matrix.label }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret not set â€” skipping notification."
            exit 0
          fi

          since=$(date -u -d '10 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          issues_json=$(gh issue list \
            --repo "$REPO" \
            --label "$LABEL" \
            --state open \
            --search "created:>${since}" \
            --json number,title \
            --limit 200)

          count=$(echo "$issues_json" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No $LABEL issues opened in window â€” nothing to roll up."
            exit 0
          fi

          sample=$(echo "$issues_json" | jq -r '.[0:5][] | "â€˘ #\(.number) \(.title)"')
          first_num=$(echo "$issues_json" | jq -r '.[0].number')
          first_url="https://github.com/${REPO}/issues/${first_num}"

          if [ "$count" -eq 1 ]; then
            MESSAGE=$(printf "đź“‹ 1 new %s issue filed\n\n%s\n\n%s" \
              "$LABEL" "$sample" "$first_url")
          else
            MESSAGE=$(printf "đź“‹ %s new %s issues filed\n\n%s\n\n%s" \
              "$count" "$LABEL" "$sample" "$first_url")
          fi
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            > /dev/null

  # Campaign-level alerts filed individually and rarely â€” no rollup,
  # fire per-issue. Covers close-time failures ([fp-campaign-close] /
  # [drift-fp-campaign-close]), the "all remaining issues blocked,
  # can't self-progress" tracking issues ([fp-campaign-stuck] /
  # [drift-fp-campaign-stuck]), and drift campaigns that hit an
  # unrecoverable state in discover/generate ([drift-campaign-broken]).
  # Scoped accounts prefix the tag (e.g. [cs-drift-fp-campaign-stuck]);
  # the contains() check matches the tag anywhere in the title so any
  # SCOPE prefix is caught. The message includes the title, so the scope
  # is visible in the alert.
  notify-campaign-alert:
    if: >
      github.event_name == 'issues' &&
      (contains(github.event.issue.title, 'fp-campaign-close]') ||
       contains(github.event.issue.title, 'fp-campaign-stuck]') ||
       contains(github.event.issue.title, 'drift-campaign-broken]'))
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret not set â€” skipping notification."
            exit 0
          fi
          MESSAGE=$(printf "âš ď¸Ź Campaign needs attention: #%s\n%s\n\n%s" \
            "$ISSUE_NUMBER" "$ISSUE_TITLE" "$ISSUE_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            > /dev/null

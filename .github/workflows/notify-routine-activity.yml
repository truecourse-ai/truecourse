name: Notify on routine activity

# Why: routine sessions run as the PR/issue author (mushgev), and GitHub
# never sends notifications for your own actions — including @mentions of
# yourself and self-review-requests. This workflow fires on PR/issue
# creation events that look like routine output and POSTs to the Telegram
# Bot API instead, bypassing the self-notify rule.
#
# Add two repo secrets before this works:
#   TELEGRAM_BOT_TOKEN — bot token from @BotFather
#   TELEGRAM_CHAT_ID   — your chat ID (DM the bot once, then GET
#                        https://api.telegram.org/bot<TOKEN>/getUpdates
#                        and copy chat.id)

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: read
  contents: read
  pull-requests: read

jobs:
  notify-pr:
    if: >
      github.event_name == 'pull_request' &&
      startsWith(github.event.pull_request.head.ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret not set — skipping notification."
            exit 0
          fi
          MESSAGE=$(printf "🔔 New routine PR #%s\n%s\n\nBranch: %s\n%s" \
            "$PR_NUMBER" "$PR_TITLE" "$PR_BRANCH" "$PR_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            > /dev/null

  # Bursts of fp-fix issues (fp-discover initial filing, fp-next-fix
  # re-discovery filing) used to produce one TG message per issue —
  # 30+ messages in a row. Debounce with concurrency: each new fp-fix
  # `issues.opened` event cancels the prior in-progress run, so only
  # the last event's run survives. That run sleeps to let the burst
  # settle, queries all fp-fix issues opened in the last 10 minutes,
  # and sends ONE rollup message with the count.
  notify-fp-fix-burst:
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'fp-fix')
    runs-on: ubuntu-latest
    concurrency:
      group: fp-fix-burst
      cancel-in-progress: true
    steps:
      - name: Wait for burst to settle
        run: sleep 60

      - name: Send rollup Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret not set — skipping notification."
            exit 0
          fi

          since=$(date -u -d '10 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          issues_json=$(gh issue list \
            --repo "$REPO" \
            --label fp-fix \
            --state open \
            --search "created:>${since}" \
            --json number,title \
            --limit 200)

          count=$(echo "$issues_json" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No fp-fix issues opened in window — nothing to roll up."
            exit 0
          fi

          sample=$(echo "$issues_json" | jq -r '.[0:5][] | "• #\(.number) \(.title)"')
          first_num=$(echo "$issues_json" | jq -r '.[0].number')
          first_url="https://github.com/${REPO}/issues/${first_num}"

          if [ "$count" -eq 1 ]; then
            MESSAGE=$(printf "📋 1 new fp-fix issue filed\n\n%s\n\n%s" \
              "$sample" "$first_url")
          else
            MESSAGE=$(printf "📋 %s new fp-fix issues filed\n\n%s\n\n%s" \
              "$count" "$sample" "$first_url")
          fi
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            > /dev/null

  # Same debounce-rollup pattern for drift-fp-fix issues filed by
  # drift-fp-discover / drift-fp-next-fix. Independent concurrency
  # group from the analysis fp-fix burst so the two never cancel
  # each other when both chains happen to be active.
  notify-drift-fp-fix-burst:
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'drift-fp-fix')
    runs-on: ubuntu-latest
    concurrency:
      group: drift-fp-fix-burst
      cancel-in-progress: true
    steps:
      - name: Wait for burst to settle
        run: sleep 60

      - name: Send rollup Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret not set — skipping notification."
            exit 0
          fi

          since=$(date -u -d '10 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          issues_json=$(gh issue list \
            --repo "$REPO" \
            --label drift-fp-fix \
            --state open \
            --search "created:>${since}" \
            --json number,title \
            --limit 200)

          count=$(echo "$issues_json" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No drift-fp-fix issues opened in window — nothing to roll up."
            exit 0
          fi

          sample=$(echo "$issues_json" | jq -r '.[0:5][] | "• #\(.number) \(.title)"')
          first_num=$(echo "$issues_json" | jq -r '.[0].number')
          first_url="https://github.com/${REPO}/issues/${first_num}"

          if [ "$count" -eq 1 ]; then
            MESSAGE=$(printf "📋 1 new drift-fp-fix issue filed\n\n%s\n\n%s" \
              "$sample" "$first_url")
          else
            MESSAGE=$(printf "📋 %s new drift-fp-fix issues filed\n\n%s\n\n%s" \
              "$count" "$sample" "$first_url")
          fi
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            > /dev/null

  # Campaign-level alerts filed individually and rarely — no rollup,
  # fire per-issue. Covers close-time failures ([fp-campaign-close] /
  # [drift-fp-campaign-close]), the "all remaining issues blocked,
  # can't self-progress" tracking issues ([fp-campaign-stuck] /
  # [drift-fp-campaign-stuck]), and drift campaigns that hit an
  # unrecoverable state in discover/generate ([drift-campaign-broken]).
  notify-campaign-alert:
    if: >
      github.event_name == 'issues' &&
      (startsWith(github.event.issue.title, '[fp-campaign-close]') ||
       startsWith(github.event.issue.title, '[fp-campaign-stuck]') ||
       startsWith(github.event.issue.title, '[drift-fp-campaign-close]') ||
       startsWith(github.event.issue.title, '[drift-fp-campaign-stuck]') ||
       startsWith(github.event.issue.title, '[drift-campaign-broken]'))
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret not set — skipping notification."
            exit 0
          fi
          MESSAGE=$(printf "⚠️ Campaign needs attention: #%s\n%s\n\n%s" \
            "$ISSUE_NUMBER" "$ISSUE_TITLE" "$ISSUE_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            > /dev/null

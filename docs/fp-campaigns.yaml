# FP-fix campaigns — source of truth for which repos we analyze, in what order, and the results.
#
# Owned by the fp-discover / fp-automation workflows. Humans may add new
# entries or reorder; sessions update `status`, `baseline`, `final`, and
# `notes`. Always read the latest from `main` — never trust a stale checkout.
#
# Status values:
#   pending      — not yet started
#   discovering  — analyze + issue filing in progress
#   in_progress  — at least one fp-fix issue still open
#   done         — final.tp_rate >= 0.90 and no open fp-fix issues
#   skipped      — manually deprioritized; note explains why
#
# Each campaign also writes its open issues with label
# `fp-target:<owner>-<repo>` so a session can find them without crawling
# this file.


# Spec-coverage groups — source of truth for which spec-doc folders we run the
# round-trip coverage loop against, in what order, and the results.
#
# Owned by the spec-coverage-automation routines. Humans add a group by committing
# its docs under docs/spec-coverage/groups/<name>/ AND adding an entry here; routine
# sessions update `status`, `baseline`, `final`, and `notes`. Always read the latest
# from `main`. The generated specs + contracts are NOT stored here — they live on a
# per-group storage branch claude/spec-cov-store/<name> (generated by
# spec-coverage-generate, deleted at close). See README "Groups".
#
# Status values:
#   pending    — folder committed, not yet generated. spec-coverage-generate picks the
#                first `pending` group whose storage branch doesn't exist yet (branch
#                existence, not this flag, is the "already started" signal).
#   measuring  — generate+measure ran; coverage scored; new-kind issues may be open /
#                kinds in flight. Stays `measuring` across the kind-build loop.
#   done       — spec-coverage-remeasure measured code_derivable_pct >= target_pct AND
#                obligations == 0 AND no remaining code-derivable gap; close PR merged;
#                storage branch deleted.
#   skipped    — manually deprioritized; note explains why.
#
# Convergence (the close gate): code_derivable_pct >= target_pct (default 90) AND
# obligations == 0 AND every still-missed requirement is `narrative`. See README.
#
# Per-group fields:
#   name           — folder name under docs/spec-coverage/groups/
#   docs_path      — path to the group's .md specs (the loop's input)
#   target_pct     — close threshold for code_derivable_pct (default 90)
#   priority       — pick order
#   baseline/final — coverage snapshots:
#     { measured_at, total_reqs, structural, obligation_only, narrative, missed,
#       code_derivable_pct, obligations }
#     (code_derivable_pct = structural / (total_reqs - narrative);
#      `obligations` = count of unenforceable-obligation artifacts — target 0)

groups:
  # ---- Seed / worked example: the docs/benchmark round-trip (see docs/benchmark/rounds/). ----
  # This group was run by hand across 3 rounds and motivated the validation-rule, fallback,
  # field-exposure, and architecture-decision(persistence-strategy) kinds. Recorded here as the
  # template; its contracts live in docs/benchmark/rounds/ rather than a storage branch.
  - name: cancellation-reason-requirement
    docs_path: docs/benchmark            # decisions.md + design.md + future-work.md
    target_pct: 90
    priority: 0
    status: done
    baseline: { measured_at: "2026-06-12", total_reqs: 58, structural: 16, obligation_only: 0, narrative: 25, missed: 17, code_derivable_pct: 28, obligations: 6 }
    final:    { measured_at: "2026-06-12", total_reqs: 57, structural: 26, obligation_only: 0, narrative: 25, missed: 6,  code_derivable_pct: 81, obligations: 0 }
    notes:
      - "Round-trip across 3 iterations (see docs/benchmark/rounds/README.md). Round 1: data model + out-of-scope captured; everything behavioral fell into 6 unenforceable-obligations (~28% structural). Round 2: added validation-rule + fallback + architecture-decision(persistence-strategy) → 0 obligations, ~76% of code-derivable subset. Round 3: added field-exposure → 81% of code-derivable subset, 0 obligations."
      - "Remaining misses are pure narrative (problem statement, user stories, UI copy, file paths, future-work) + a few fragile wiring items (prop-threading) — no code signal, correctly uncaptured. Hit the close gate on the code-derivable subset."

  # ---- Add new groups below. Commit the folder under docs/spec-coverage/groups/<name>/, ----
  # ---- add an entry with status: pending, then push (or Run now on spec-coverage-generate). ----

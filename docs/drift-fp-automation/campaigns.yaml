# Drift-FP campaigns — source of truth for which repos we run the drift verifier
# against, in what order, and the results.
#
# Owned by the drift-fp-automation routines. Humans add/reorder entries; routine
# sessions update `status`, `baseline`, `final`, and `notes`. Always read the
# latest from `main`. The CONTRACTS themselves are NOT stored here — they live on
# per-campaign storage branches `claude/drift-fp-store/<owner>-<repo>` (generated
# once by drift-fp-generate, deleted at close). See README "Generating & storing
# contracts".
#
# Status values (no `in_progress` — a campaign stays `discovering` from issue
# filing through the whole fix loop until it closes):
#   pending      — not yet started. drift-fp-generate picks the first `pending`
#                  campaign whose storage branch doesn't exist yet (branch
#                  existence, not a yaml flag, is the "already generated" signal).
#   discovering  — drift-fp-discover has run / the fix loop is in progress
#                  (set by the discovery PR that merges to main).
#   done         — drift-fp-next-fix verified NO false-positive drifts remain
#                  (fp == 0); campaign-close PR merged; vX.Y.Z tagged; storage
#                  branch deleted.
#   skipped      — manually deprioritized; note explains why
#
# Convergence is driven toward fp == 0 (not "tp_rate >= 0.90" — these targets
# have ~0 genuine drift, so tp≈0 and a TP-rate gate is meaningless). The close
# gate is "no false-positive drift-kinds remain". See README "TP/FP rubric".
#
# Per-campaign fields:
#   target_repo      — owner/repo
#   tech_stack       — informational
#   code_dir         — passed to `verify --code-dir` (relative to repo root; "." = root).
#                      Authoritative copy lives in the storage branch's meta.yaml.
#   doc_scope        — the .md dirs the `.truecourseignore` keeps (drift-fp-generate uses this)
#   priority         — pick order
#   baseline/final   — drift snapshots: { verified_at, target_ref, total_drifts, tp, fp, info, fp_rate }
#                      target_ref MUST equal the storage branch's meta.yaml target_ref.
#
# Each campaign also writes its open issues with label
# `drift-fp-target:<owner>-<repo>` so a session can find them without crawling this file.
# Targets are vetted empirically (clone + `infer --dry-run` probe of spec↔code
# overlap) before seeding — see README "Selecting targets".

campaigns:
  # ---- JS/TS — strongest validated drift fit (fit 88, strong) ----
  - target_repo: strapi/strapi
    tech_stack: [typescript, monorepo, knex]
    code_dir: "."
    doc_scope:
      - docs/docs/docs/01-core/authentication
      - docs/docs/docs/01-core/content-manager
      - docs/docs/docs/01-core/content-releases
      - docs/docs/docs/01-core/permissions
      - docs/docs/rfcs
    priority: 1
    status: done
    baseline: { verified_at: "2026-06-04", target_ref: "b2ba15617de4c8ada9099789f7c774bb32328970", total_drifts: 38, tp: 0, fp: 29, info: 9, fp_rate: 1.00 }
    final:    { verified_at: "2026-06-05", target_ref: "b2ba15617de4c8ada9099789f7c774bb32328970", total_drifts: 18, tp: 0, fp: 5, info: 13, fp_rate: 1.00 }
    notes:
      - "Validation run found 44 drift items, ~0 genuine: 20 Operation implementation.missing FPs (relative-path plugin routes mounted under a prefix; extractor doesn't reconstruct the mount), 13 NamedConstant ACTIONS value-mismatch FPs (bare-name collision, no module scoping), 11 no-code-counterpart info notes. PublicationFilter enum verified cleanly (true negative). Strong first FP corpus: operation mount-prefix + named-constant module-scoping."
      - "Default branch is develop, not main — pin target_ref off develop."
      - "Discovery run (2026-06-04): 38 drifts, 29 FP, 0 TP, 9 info. FP kinds: operation/implementation-missing (16 FPs — mount-prefix not reconstructed; 5 contract-quality for routes outside packages/core), operation/response-status (1 FP — route matched in test mock), auth-requirement/unprotected (2 FPs — same test-mock root cause), named-constant/no-code-counterpart (10 FPs — ACTIONS.* dotted-path object props + preview.STRAPI_* window globals). Info: enum/extra-value PublicationFilter (contract missed published-with-draft), enum/no-code-counterpart ReleaseStatus (case mismatch), maxPendingReleases (inline literal, not named constant)."
      - "Closed manually at fp=5 (not the routine's fp==0 gate). Iterations through the fix loop drove total_drifts 38→18 and fp 29→5 via FP-GUARD coverage in the comparator + named-constant extractor; the remaining 5 are all operation/implementation-missing on plugin content-api routes that strapi mounts under `/api/` (4 auth routes: GET/POST /api/auth/* under packages/core/admin/server/src/routes/content-api/authentication.ts, plus 1 runtime-generated `/api/content-manager/:collection` route). The plugin-mount extractor only reconstructs `/<plugin>` prefixes from `<plugin>/server/routes/` paths; strapi's content-api convention (`/api/` prefix, `routes/content-api/*` subdirs) and runtime-built routes are not lifted. Fixing this generically (mount-tolerant matching: method + path suffix + signature fingerprint) is queued — revisit after feast/directus campaigns reveal what conventions are worth handling. These 5 are documented limitations, not engine regressions."

  # ---- Python — best validated Python drift fit (fit 78, strong) ----
  - target_repo: feast-dev/feast
    tech_stack: [python, feature-store]
    code_dir: "."
    doc_scope: []        # fill before generating (keep the behavioral docs/ .md; drop the 93 .rst)
    priority: 2
    status: done
    baseline: { verified_at: "2026-06-05", target_ref: "276b6df562e16fefba7efb493736ff32046d4a76", total_drifts: 17, tp: 0, fp: 13, info: 4, fp_rate: 1.00 }
    final:    { verified_at: "2026-06-05", target_ref: "276b6df562e16fefba7efb493736ff32046d4a76", total_drifts: 11, tp: 0, fp: 0, info: 11, fp_rate: 0, tp_rate: 1.0 }
    notes:
      - "Probe histogram: NamedConstant 189, Operation 71, Enum 20, Formula 6, Pagination present. Has 93 .rst (invisible to the tool) alongside .md."
      - "Discovery run (2026-06-05): 17 drifts, 13 FP, 0 TP, 4 info. FP kinds: named-constant/value-mismatch (Python constants extracted as strings vs int/bool literals), named-constant/no-code-counterpart (env-var and config default constants stored as Python dict literals, not named constants). Info: 4 no-code-counterpart items for constants documented but not exposed as named symbols."
      - "Close verified at fp=0 against node dist/cli.mjs on pinned contracts (target_ref unchanged). 11 remaining drifts are all named-constant/no-code-counterpart [info] — documented constants that aren't exposed as named Python symbols (env vars, config defaults, batch engine type string). No false-positive drifts remain."

  # ---- JS/TS — secondary validated fit (fit 42, 'maybe') ----
  - target_repo: directus/directus
    tech_stack: [typescript, knex]
    code_dir: "."
    doc_scope:
      - api/src/ai/tools   # 13 prompt.md files, ~3K lines of behavioral spec for the AI tool surface (flows, operations, items, fields, …)
    priority: 3
    status: pending
    baseline: { verified_at: null, target_ref: null, total_drifts: null, tp: null, fp: null, info: null, fp_rate: null }
    final:    { verified_at: null, target_ref: null, total_drifts: null, tp: null, fp: null, info: null, fp_rate: null }
    notes: ["Narrow but real overlap: Flows TriggerType/accountability/status enums in prompt.md ↔ code enums. Docs mostly live in a separate repo, so spec surface is thin.", "doc_scope filled 2026-06-05: 13 api/src/ai/tools/*/prompt.md files (~3K lines) cover the AI tool surface; biggest is flows/prompt.md (540 lines) which contains the trigger/status/accountability enums called out in the campaign hint."]

